<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玩家对比 - Rotaeno排行榜</title>
    <link rel="shortcut icon" href="/static/img/app_icon.png" type="image/png">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='dark.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='compare.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

    <header>
        <div class="container">
            <div class="header-content">
                <div>
                    <h1>玩家成绩对比 <span class="type-display">Compare</span></h1>
                    <p class="last-updated">
                        选择 2 位玩家进行全方位数据对比
                    </p>
                    <p class="last-updated">
                        数据来源Suzuneko铃猫酱Bot
                    </p>
                    <div class="header-buttons">
                        <button class="view-notice-btn" onclick="window.location.href='/'">
                            <!-- <i class="fas fa-list-ol"></i> 返回排行榜 -->
                            返回排行榜
                        </button>
                        <button class="view-notice-btn" onclick="window.location.href='/trend'">
                            <!-- <i class="fas fa-chart-line"></i> 数据趋势 -->
                            数据趋势
                        </button>
                        <button class="view-notice-btn" onclick="window.location.href='/notice'">
                            <!-- <i class="fas fa-info-circle"></i> 使用声明 -->
                            使用声明
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <button id="backToTop">
            <svg class="icon"><use xlink:href="/static/icons.svg#icon-back-to-top"></use></svg>
        </button>
        <label for="theme-toggle" id="theme-change">
            <svg class="icon" id="light"><use xlink:href="/static/icons.svg#icon-light-theme"></use></svg>
            <svg class="icon" id="dark"><use xlink:href="/static/icons.svg#icon-dark-theme"></use></svg>
        </label>
        <input type="checkbox" id="theme-toggle" hidden>

        <!-- 玩家选择区域 -->
        <div class="player-selection-section">
            <div class="selection-header">
                <h2>选择玩家</h2>
                <button id="compare-btn" class="compare-btn" disabled>
                    <i class="fas fa-exchange-alt"></i>
                    <span>开始对比</span>
                </button>
            </div>

            <div class="players-grid" id="players-grid">
                <!-- Player 1 -->
                <div class="player-input-card">
                    <div class="player-number">玩家 1</div>
                    <input type="text" 
                           class="player-input" 
                           id="player-1" 
                           placeholder="输入或选择玩家名称..."
                           autocomplete="off">
                    <div class="autocomplete-dropdown" id="dropdown-1"></div>
                    <div class="player-color" style="background: #FF6B6B;"></div>
                </div>

                <!-- Player 2 -->
                <div class="player-input-card">
                    <div class="player-number">玩家 2</div>
                    <input type="text" 
                           class="player-input" 
                           id="player-2" 
                           placeholder="输入或选择玩家名称..."
                           autocomplete="off">
                    <div class="autocomplete-dropdown" id="dropdown-2"></div>
                    <div class="player-color" style="background: #4ECDC4;"></div>
                </div>
            </div>
        </div>

        <!-- 加载提示 -->
        <div id="loading-section" class="loading-section" style="display: none;">
            <div class="loader"></div>
            <p>正在加载对比数据...</p>
        </div>

        <!-- 对比结果区域 -->
        <div id="comparison-results" class="comparison-results" style="display: none;">
            <!-- 基础数据对比卡片 -->
            <div class="stats-comparison-section">
                <h2>基础数据对比</h2>
                <div class="stats-grid" id="stats-grid">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- 排名对比（并列排名） -->
            <div class="rank-comparison-section">
                <h2>并列排名对比</h2>
                <div class="rank-grid" id="rank-grid">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- 详细数据表格 -->
            <div class="table-section">
                <h2>详细数据表格</h2>
                <div class="table-responsive">
                    <table id="comparison-table">
                        <thead>
                            <tr>
                                <th>数据项</th>
                                <!-- 动态生成玩家列 -->
                            </tr>
                        </thead>
                        <tbody>
                            <!-- 动态生成 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    {% include 'footer.html' %}

    <script src="{{ url_for('static', filename='compare.js') }}"></script>
</body>
</html>
